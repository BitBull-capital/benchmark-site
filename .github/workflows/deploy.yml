# Build and deploy the VitePress benchmark site to GitHub Pages.
# Triggered on every push to master (including pushes of new backtest zip files).
name: Deploy VitePress site to Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Install dependencies
        run: npm ci

      # Extract the main backtest result JSON from each zip in benchmarks/.
      # Each zip is named  backtest-result-TIMESTAMP.zip
      # and contains       backtest-result-TIMESTAMP.json  (+ config, strategy, feather).
      # We extract only the main JSON (same base name as the zip) to
      # docs/public/benchmarks-data/ so VitePress can read it at build time
      # and serve it as a static asset for the detail-page fetch.
      - name: Extract backtest result JSONs
        run: |
          mkdir -p docs/public/benchmarks-data
          for zip in benchmarks/backtest-result-*.zip; do
            [ -f "$zip" ] || continue
            base="$(basename "${zip%.zip}")"
            echo "Extracting ${base}.json …"
            unzip -p "$zip" "${base}.json" > "docs/public/benchmarks-data/${base}.json"
          done

      - name: Build with VitePress
        run: |
          npm run docs:build
          touch docs/.vitepress/dist/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
